name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm run build

      - name: Deploy via SFTP to TransIP
        env:
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          sudo apt-get install -y lftp
          lftp -e "
            set sftp:auto-confirm yes;
            set net:timeout 30;
            set net:max-retries 3;
            mirror -R --delete --no-perms --parallel=4 --verbose ./out/ /httpdocs/;
            quit
          " -u imadginenl,"$DEPLOY_PASSWORD" sftp://imadgi.ssh.transip.me
